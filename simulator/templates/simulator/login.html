{% extends 'simulator/base.html' %}
{% block title %}Login - AFIT Simulator{% endblock %}

{% block content %}
<div style="max-width: 460px; margin: 0 auto;">

    <div class="text-center mb-24">
        <h1>Welcome Back</h1>
        <p class="mt-8">Login to continue your practice</p>
    </div>

    <div class="card card-glow">
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">

                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg mt-16">
                Login →
            </button>

            <p class="text-center text-sm text-muted mt-16">
                Don't have an account?

                <a href="/register/" class="text-blue" style="text-decoration: none; font-weight: 600;">Register</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}

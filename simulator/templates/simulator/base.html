<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AFIT Post-UTME Simulator{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #050d1a;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --blue: #3b82f6;
            --blue-light: #60a5fa;
            --blue-glow: rgba(59, 130, 246, 0.3);
            --text: #f1f5f9;
            --text-muted: #64748b;
            --text-subtle: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;

            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
        }

        /* ── NAV ── */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            background: rgba(5, 13, 26, 0.8);
            position: sticky;
            top: 0;

            z-index: 100;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background: var(--blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--blue);
        }

        .nav-links { display: flex; align-items: center; gap: 8px; }

        .nav-links a {
            color: var(--text-subtle);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            padding: 7px 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: var(--text);
            background: var(--surface-hover);
        }

        .nav-links a.active {
            color: var(--blue-light);
            background: rgba(59, 130, 246, 0.1);

        }

        /* ── CONTAINER ── */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* ── CARDS ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 20px;
            backdrop-filter: blur(8px);
            transition: border-color 0.2s;
        }

        .card:hover { border-color: rgba(59, 

130, 246, 0.2); }

        .card-glow {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.08);
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 24px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border: none;

            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: var(--blue);
            color: white;
            box-shadow: 0 4px 15px var(--blue-glow);
        }

        .btn-primary:hover {
            background: #2563eb;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.5);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            color: var(--blue-light);

            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .btn-outline:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--blue);
        }

        .btn-ghost {
            background: var(--surface);
            color: var(--text-subtle);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .btn-danger {

            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }

        .btn-full { width: 100%; }
        .btn-lg { padding: 14px 32px; font-size: 1rem; }

        /* ── FORMS ── */
        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-subtle);

            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        input::placeholder { color: var(--text-muted); }

        input:focus, select:focus {
            outline: none;
            border-color: var(--blue);
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 0 0 3px var(--blue-glow);
        }

        select option { background: #0d1f3c; color: var(--text); }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── BADGES ── */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-blue {
            background: rgba(59, 130, 246, 0.15);
            color: var(--blue-light);
            border: 1px solid rgba(59, 130, 246, 0.2);

        }

        .badge-green {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .badge-red {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* ── ALERTS ── */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;

            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        /* ── TYPOGRAPHY ── */

        h1 { font-size: 1.8rem; font-weight: 800; color: var(--text); line-height: 1.2; }
        h2 { font-size: 1.3rem; font-weight: 700; color: var(--text); }
        h3 { font-size: 1rem; font-weight: 600; color: var(--text-subtle); }
        p { color: var(--text-subtle); line-height: 1.6; font-size: 0.95rem; }

        .text-blue { color: var(--blue-light); }
        .text-muted { color: var(--text-muted); }
        .text-subtle { color: var(--text-subtle); }
        .text-sm { font-size: 0.85rem; }
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .font-bold { font-weight: 700; }

        /* ── UTILS ── */
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: 

space-between; }
        .gap-10 { gap: 10px; }
        .gap-20 { gap: 20px; }
        .mt-8 { margin-top: 8px; }
        .mt-16 { margin-top: 16px; }
        .mt-24 { margin-top: 24px; }
        .mb-8 { margin-bottom: 8px; }
        .mb-16 { margin-bottom: 16px; }
        .mb-24 { margin-bottom: 24px; }
        .w-full { width: 100%; }
        @media (max-width: 768px) {
    nav { padding: 14px 20px; }
    .logo { font-size: 0.95rem; }
    .nav-links a { font-size: 0.78rem; padding: 6px 8px; }
    .container { padding: 24px 16px; }
    .card { padding: 20px; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1.1rem; }
    .btn-lg { padding: 11px 20px; font-size: 0.9rem; }
    .flex { flex-wrap: wrap; }
    .gap-20 { gap: 12px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">
        <div class="logo-dot"></div>
        AFIT SIMULATOR
    </div>
    <div class="nav-links">
        {% if user.is_authenticated %}

            <a href="/dashboard/">Dashboard</a>
            <a href="/exam/">Take Exam</a>
            <a href="/logout/" class="btn btn-ghost" style="padding: 7px 14px; font-size: 0.88rem;">Logout</a>
        {% else %}
            <a href="/login/">Login</a>
            <a href="/register/" class="btn btn-primary" style="padding: 7px 16px; font-size: 0.88rem;">Register</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% if messages %}
        {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                {{ message }}

            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
